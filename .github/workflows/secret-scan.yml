name: Secret scan

# Working-tree scan on every PR + push. Catches new credential literals
# at review time. Historical leaks are not scanned here — when git
# history is rewritten to purge the legacy seed-production secrets,
# replace `gitleaks dir .` with `gitleaks detect` so it also walks
# every commit.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks (working tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks

      - name: Scan working tree
        run: |
          ./gitleaks dir . \
            --config .gitleaks.toml \
            --verbose \
            --exit-code 1 \
            --redact
